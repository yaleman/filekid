version: 2
updates:
- package-ecosystem: cargo
  directory: /
  schedule:
    interval: weekly
    day: monday
    time: 00:00
    timezone: Etc/UTC
  groups:
    cargo:
      patterns:
      - '*'
- package-ecosystem: github-actions
  directory: /
  schedule:
    interval: weekly
    day: monday
    time: 00:00
    timezone: Etc/UTC
  groups:
    github-actions:
      patterns:
      - '*'
